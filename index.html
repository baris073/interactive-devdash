<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Interactive DevDash</title>
</head>
<body class="bg-gray-900 h-screen w-screen flex flex-col overflow-x-hidden">

    <nav class="bg-[#2b2a2a] h-[60px] flex justify-between items-center px-4 shrink-0 shadow-md">
        <div class="flex items-center gap-4">
            <img class="w-[50px] h-[50px] object-contain inline" src="/assets/coding.png" alt="logo">
            <span class="text-white text-lg font-bold">Interactive DevDash</span>
        </div>
        <div>
            <img class="w-[30px] h-[30px] object-contain" src="/assets/exit.png" alt="exit">
        </div>
    </nav>

    <div class="flex-1 p-4 flex flex-col gap-4 md:grid md:grid-cols-12 min-h-0 overflow-y-auto md:overflow-hidden">
        
        <div class="col-span-12 md:col-span-3 flex flex-col gap-4">
            
            <div class="bg-[#2b2a2a] rounded-lg p-4 flex flex-col items-center justify-center shadow-lg border border-gray-800 ">
                <h3 class="text-blue-500 text-2xl font-bold" id="oclock"></h3>
                <h3 class="text-white text-md font-medium mt-1">ሰላም ላንተ ይሁን ዮናስ</h3>
            </div>

            <div class="bg-[#2b2a2a] rounded-lg p-4 border-[#2044dd] border-2 shadow-lg flex-1"> 
                <p class="text-gray-400 text-sm">Addis Ababa</p>
                <div class="flex gap-5 items-center mt-2">
                    <img src="/assets/sunny.png" alt="sun" class="w-[50px] h-[50px]">
                    <div>
                        <h3 class="text-white text-xl font-bold">25 <span>&#176;c</span></h3>
                        <h3 class="text-gray-300 text-sm">Sunny</h3>
                    </div>
                </div>
                
                <hr class="mt-4 border-gray-700">
                
                <div class="flex justify-between mt-4 text-center">
                    <div>
                        <h4 class="text-gray-400 text-xs font-bold">Tue</h4>
                        <img class="w-[25px] mx-auto my-1" src="/assets/sunny.png" alt="sunny">
                        <p class="text-white text-xs">25&#176;c</p>
                    </div>
                    <div>
                        <h4 class="text-gray-400 text-xs font-bold">Wed</h4>
                        <img class="w-[25px] mx-auto my-1" src="/assets/cloud.png" alt="cloud">
                        <p class="text-white text-xs">23&#176;c</p>
                    </div>
                    <div>
                        <h4 class="text-gray-400 text-xs font-bold">Thu</h4>
                        <img class="w-[25px] mx-auto my-1" src="/assets/sunny.png" alt="sunny">
                        <p class="text-white text-xs">26&#176;c</p>
                    </div>
                </div>
            </div>
        </div>

        <main class="col-span-12 md:col-span-6 bg-[#2b2a2a]/50 border-[#2044dd] border-2 rounded-lg p-4 shadow-lg flex flex-col">
            <h2 class="text-white text-lg font-bold">TO-DO LIST</h2>
            <h2 class="text-gray-400 text-sm mb-4">የዕለቱ ተግባራት</h2>
            
            <div class="flex mt-2">
                <input type="text" placeholder="አዲስ ተግባር አስገባ . . ." class="bg-gray-800 text-white border border-gray-700 px-3 py-2 rounded-l-lg focus:outline-none flex-1 max-w-[300px]">
                <button class="bg-[#d8d808] hover:bg-yellow-500 text-gray-900 px-4 font-bold rounded-r-lg transition-colors">+</button>
            </div>
            
            <div class="mt-4 flex-1 overflow-y-auto"></div>
        </main>

        <div class="col-span-12 md:col-span-3 flex flex-col gap-4">
            
            <article class="bg-[#2b2a2a]/50 border-[#2044dd] border-2 rounded-lg p-4 shadow-lg flex-1 min-h-[180px]">
                <h3 class="text-white text-lg font-bold">የአይቲ ጥቅሶች </h3>
                <div class="bg-[#08dccb] w-[60px] h-[60px] rounded-full mt-4 flex items-center justify-center">
                    <img src="/assets/load.png" alt="load" class="w-[25px]">
                </div>
                <div class="">

                </div>
            </article>

            <article class="bg-[#2b2a2a]/50 border-[#2044dd] border-2 rounded-lg p-4 shadow-lg flex-1 min-h-[180px]">
                <div>
                      <h3 class="text-white text-[12px] font-bold p-2">GitHub Repo:<span class="text-blue-500"> Interactive DevDash</span></h3>
                    </div>
                <div class="flex justify-between p-2">
                        <div>
                        <h3 class="text-white font-bold">stars</h3>
                        <img src="/assets/star.png" alt="star" class="w-[20px] items-center"><span class="text-white">15</span>
                      </div>
                      <div>
                        <h3 class="text-white font-bold">forks</h3>
                        <img src="/assets/fork.png" alt="fork" class="w-[20px]"><span class="text-white">4</span>
                      </div>
                      <div>
                        <h3 class="text-white font-bold">watchers</h3>
                        <img src="/assets/eye.png" alt="eye" class="w-[20px]"><span class="text-white">8</span>
                      </div>
            </article>
            
        </div>

    </div>
<script>
    const oclock = document.getElementById('oclock');

    function showTime(){
    
    setInterval(() => {
        const d = new Date();
        const hours =d.getHours();
        const minutes =String(d.getMinutes()).padStart(2, '0');
        const seconds =String(d.getSeconds()).padStart(2, '0');
        const periodhour = hours >= 12 ? 'PM' : 'AM';
        const hour12 = hours % 12 || 12;
        const formattedTime = `${hour12}:${minutes}:${seconds} ${periodhour}`;
        
        oclock.textContent = formattedTime;
    }, 1000);
    

    }
    showTime();
    const apikey = '530409663dfa413099b175303262705';
    const city = 'Addis Ababa';
    const apiurl =`https://api.weatherapi.com/v1/current.json?key=${apikey}&q=${city}`;
    fetch(apiurl)
    .then(response => response.json()) // የመጣውን መረጃ ወደ JSON መቀየር
    .then(data => {
        console.log(data); // ሙሉውን የአየር ንብረት መረጃ በኮንሶል ማየት ትችላለህ
    })
    .catch(error => console.log("ስህተት አጋጥሟል:", error));
   
    </script>
</script>
</body>
</html>
